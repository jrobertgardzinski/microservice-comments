spring.application.name=comments-service
server.port=8085

# Real persistence: Postgres in the stack, Flyway owns the schema (H2 stands in for tests).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/comments}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:secret}

# Who confirms tokens and who knows which memes exist.
security.url=${SECURITY_URL:http://localhost:8080}
memes.url=${MEMES_URL:http://localhost:8083}

# The gallery UI's origin (it is served by microservice-memes and calls this service directly).
comments.ui-origin=${UI_ORIGIN:http://localhost:8083}

# Account-deletion saga (comments axis) + the MEME_DELETED thread cascade; enabled where a broker
# exists. Rule vocabulary: DELETE | ANONYMIZE_AUTHOR | KEEP_POPULAR_ANONYMIZED:<minScore>.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
comments.kafka-enabled=${KAFKA_ENABLED:false}

# Anti-spam: at most this many comments per author per minute (429 above it; 0 disables).
comments.rate-limit.per-minute=${COMMENT_RATE_LIMIT:20}
comments.purge.comments=${PURGE_COMMENTS_POLICY:ANONYMIZE_AUTHOR}

# observability: correlation id on every log line
logging.pattern.level=%5p [cid=%X{cid:-}]

# observability: metrics for the workspace's Prometheus (scrape: /actuator/prometheus)
management.endpoints.web.exposure.include=health,prometheus
